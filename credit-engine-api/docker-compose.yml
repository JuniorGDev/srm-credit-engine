version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: credit-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credit-engine-network

volumes:
  postgres_data:

networks:
  credit-engine-network: